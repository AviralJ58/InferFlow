[project]
name = "inferflow-llm-sdk"
version = "0.1.0"
description = "LLM provider abstraction layer for InferFlow"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.0",
    "google-genai>=0.1.0",
    "openai>=1.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["inferflow_llm"]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]
