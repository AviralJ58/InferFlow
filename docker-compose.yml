# ===========================================================================
# InferFlow — Docker Compose (Local Development)
# ===========================================================================
# Orchestrates all services for local development with hot-reload.
#
# Usage:
#   docker compose up -d --build
#   docker compose logs -f
# ===========================================================================

services:
  # -------------------------------------------------------------------------
  # Infrastructure
  # -------------------------------------------------------------------------

  redis:
    image: redis:7-alpine
    container_name: inferflow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - inferflow-net
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: inferflow-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-inferflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-inferflow_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-inferflow}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/init-db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-inferflow} -d ${POSTGRES_DB:-inferflow}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - inferflow-net
    restart: unless-stopped

  # -------------------------------------------------------------------------
  # Application Services
  # -------------------------------------------------------------------------

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      target: dev
    container_name: inferflow-frontend
    ports:
      - "5173:5173"
    environment:
      - CHAT_SERVICE_HOST=chat-service
      - MONITORING_SERVICE_HOST=monitoring-service
    volumes:
      - ./apps/frontend:/app:cached
      - /app/node_modules # Prevent host node_modules from overriding container
    depends_on:
      chat-service:
        condition: service_healthy
      monitoring-service:
        condition: service_healthy
    networks:
      - inferflow-net
    restart: on-failure

  chat-service:
    build:
      context: .
      dockerfile: apps/chat-service/Dockerfile
    container_name: inferflow-chat-service
    command: ["uv", "run", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./apps/chat-service/app:/app/apps/chat-service/app:cached
      - ./packages/shared/inferflow_shared:/app/packages/shared/inferflow_shared:cached
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - inferflow-net
    restart: on-failure

  ingestion-worker:
    build:
      context: .
      dockerfile: apps/ingestion-worker/Dockerfile
    container_name: inferflow-ingestion-worker
    # No --reload for standard python script unless we use watchgod/watchfiles. We'll just run it standard.
    command: ["uv", "run", "python", "-m", "worker.main"]
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./apps/ingestion-worker/worker:/app/apps/ingestion-worker/worker:cached
      - ./packages/shared/inferflow_shared:/app/packages/shared/inferflow_shared:cached
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - inferflow-net
    restart: on-failure

  monitoring-service:
    build:
      context: .
      dockerfile: apps/monitoring-service/Dockerfile
    container_name: inferflow-monitoring-service
    command: ["uv", "run", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8001", "--reload"]
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./apps/monitoring-service/app:/app/apps/monitoring-service/app:cached
      - ./packages/shared/inferflow_shared:/app/packages/shared/inferflow_shared:cached
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - inferflow-net
    restart: on-failure

# ---------------------------------------------------------------------------
# Volumes & Networks
# ---------------------------------------------------------------------------

volumes:
  redis_data:
  postgres_data:

networks:
  inferflow-net:
    driver: bridge
